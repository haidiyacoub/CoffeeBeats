<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How Was Your Visit? — Coffee Beats</title>
  <meta name="description" content="Tell us about your Coffee Beats experience." />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --peach:    #EFBBA3;
      --dark:     #333333;
      --slate:    #9AA0A1;
      --mid:      #5F6668;
      --cream:    #EFECE5;
      --lightgrey:#E9E6DF;
      --white:    #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 20px 72px;
    }

    /* ── LOGO ── */
    .logo {
      width: clamp(100px, 22vw, 140px);
      margin-bottom: 32px;
      opacity: 0.96;
    }

    /* ── CARD ── */
    .card {
      background: var(--lightgrey);
      border-radius: 3px;
      padding: clamp(28px, 6vw, 48px) clamp(22px, 6vw, 44px);
      max-width: 540px;
      width: 100%;
      box-shadow: 0 32px 90px rgba(0,0,0,0.38);
    }

    .card-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.38em;
      color: var(--peach);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dark);
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.1;
    }

    /* ── FORM BLOCKS ── */
    .form-block {
      margin-bottom: 30px;
    }

    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--mid);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .form-label .opt {
      font-weight: 300;
      text-transform: none;
      letter-spacing: 0.06em;
      color: var(--slate);
    }

    /* ── EMOJI RATING ── */
    .emoji-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }

    .emoji-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 14px 6px 12px;
      background: rgba(255,255,255,0.65);
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.17s ease;
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .emoji-btn .elabel {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate);
      transition: color 0.17s;
    }

    .emoji-btn:hover {
      background: rgba(239,187,163,0.22);
      border-color: rgba(239,187,163,0.6);
      transform: translateY(-2px);
    }

    .emoji-btn.selected {
      background: var(--peach);
      border-color: var(--peach);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(239,187,163,0.4);
    }

    .emoji-btn.selected .elabel {
      color: var(--dark);
    }

    /* ── BARISTA DROPDOWN ── */
    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      padding: 13px 44px 13px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(51,51,51,0.16);
      border-radius: 2px;
      color: var(--dark);
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--peach); }

    select option[value=""] { color: var(--slate); }

    .select-chevron {
      position: absolute;
      right: 16px;
      top: 50%;
      width: 9px;
      height: 9px;
      border-right: 2px solid var(--slate);
      border-bottom: 2px solid var(--slate);
      transform: translateY(-68%) rotate(45deg);
      pointer-events: none;
    }

    /* ── STANDOUT CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .chip {
      padding: 10px 17px;
      background: rgba(255,255,255,0.65);
      border: 1.5px solid rgba(51,51,51,0.14);
      border-radius: 100px;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      transition: all 0.17s ease;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }

    .chip:hover {
      border-color: rgba(239,187,163,0.7);
      background: rgba(239,187,163,0.15);
    }

    .chip.selected {
      background: var(--peach);
      border-color: var(--peach);
      box-shadow: 0 4px 14px rgba(239,187,163,0.35);
    }

    /* ── TEXTAREA ── */
    textarea {
      width: 100%;
      padding: 14px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.75;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(51,51,51,0.16);
      border-radius: 2px;
      color: var(--dark);
      resize: vertical;
      min-height: 106px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.02em;
    }

    textarea::placeholder { color: var(--slate); }
    textarea:focus { border-color: var(--peach); }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--peach);
      color: var(--dark);
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      margin-top: 4px;
      transition: background 0.2s, opacity 0.2s, transform 0.12s;
    }

    .submit-btn:hover  { background: #e8a98e; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: rgba(51,51,51,0.1);
      margin: 32px 0;
    }

    /* ── THANK YOU ── */
    .thankyou {
      display: none;
      text-align: center;
      padding: 24px 12px 16px;
    }

    .thankyou-icon {
      font-size: 52px;
      margin-bottom: 20px;
      line-height: 1;
    }

    .thankyou h2 {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .thankyou p {
      font-size: 13px;
      font-weight: 300;
      color: var(--mid);
      line-height: 1.85;
      max-width: 340px;
      margin: 0 auto;
    }

    .thankyou-back {
      display: inline-block;
      margin-top: 28px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--peach);
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid rgba(239,187,163,0.4);
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
    }

    .thankyou-back:hover { color: var(--dark); border-color: var(--dark); }

    /* ── FOOTER NOTE ── */
    .footer-note {
      margin-top: 28px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      text-align: center;
    }

    /* ── ERROR STATE ── */
    .error-note {
      margin-top: 10px;
      font-size: 10px;
      color: #c0756a;
      letter-spacing: 0.06em;
      text-align: center;
      display: none;
    }

    @media (max-width: 400px) {
      .emoji-btn .elabel { display: none; }
      .emoji-btn { padding: 12px 4px 10px; }
    }
  </style>
</head>
<body>

  <img src="coffee-beats-logo.png" alt="Coffee Beats" class="logo" />

  <div class="card">

    <!-- ── FORM ─────────────────────────────────────────────── -->
    <div id="formWrap">
      <p class="card-eyebrow">Specialty Coffee for Creators</p>
      <h1 class="card-title">How Was Your<br />Visit Today?</h1>

      <form id="feedbackForm" onsubmit="handleSubmit(event)" novalidate>

        <!-- 1. EXPERIENCE RATING -->
        <div class="form-block">
          <label class="form-label">How was your experience today?</label>
          <div class="emoji-row" role="group" aria-label="Experience rating">
            <button type="button" class="emoji-btn" data-value="5" data-label="Amazing" onclick="selectRating(this)" aria-pressed="false">
              😍<span class="elabel">Amazing</span>
            </button>
            <button type="button" class="emoji-btn" data-value="4" data-label="Good" onclick="selectRating(this)" aria-pressed="false">
              😊<span class="elabel">Good</span>
            </button>
            <button type="button" class="emoji-btn" data-value="3" data-label="Okay" onclick="selectRating(this)" aria-pressed="false">
              😐<span class="elabel">Okay</span>
            </button>
            <button type="button" class="emoji-btn" data-value="2" data-label="Meh" onclick="selectRating(this)" aria-pressed="false">
              😕<span class="elabel">Meh</span>
            </button>
            <button type="button" class="emoji-btn" data-value="1" data-label="Bad" onclick="selectRating(this)" aria-pressed="false">
              😞<span class="elabel">Bad</span>
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 2. BARISTA -->
        <div class="form-block">
          <label class="form-label" for="barista">Who served you today?</label>
          <div class="select-wrap">
            <select id="barista" name="barista">
              <option value="">— Select a barista —</option>
              <!-- ✏️  UPDATE BARISTA NAMES BELOW TO MATCH YOUR TEAM -->
              <option value="Yasmine">Yasmine</option>
              <option value="Omar">Omar</option>
              <option value="Nour">Nour</option>
              <option value="Ahmed">Ahmed</option>
              <option value="Dina">Dina</option>
              <option value="Karim">Karim</option>
              <option value="Mariam">Mariam</option>
              <option value="Tarek">Tarek</option>
            </select>
            <div class="select-chevron" aria-hidden="true"></div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 3. WHAT STOOD OUT -->
        <div class="form-block">
          <label class="form-label">What stood out?</label>
          <div class="chips" role="group" aria-label="What stood out">
            <button type="button" class="chip" data-value="Amazing coffee"     onclick="toggleChip(this)" aria-pressed="false">🔥 Amazing coffee</button>
            <button type="button" class="chip" data-value="Super friendly staff" onclick="toggleChip(this)" aria-pressed="false">💛 Super friendly staff</button>
            <button type="button" class="chip" data-value="Loved the vibe"     onclick="toggleChip(this)" aria-pressed="false">🎶 Loved the vibe</button>
            <button type="button" class="chip" data-value="Fast service"        onclick="toggleChip(this)" aria-pressed="false">⚡ Fast service</button>
            <button type="button" class="chip" data-value="Cool artistic energy" onclick="toggleChip(this)" aria-pressed="false">🎤 Cool artistic energy</button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 4. OPEN FEEDBACK -->
        <div class="form-block">
          <label class="form-label" for="openFeedback">
            Tell us more <span class="opt">(optional)</span>
          </label>
          <textarea
            id="openFeedback"
            name="openFeedback"
            placeholder="Anything you'd like us to know — what went well, what could be better, a shout-out or a suggestion…"
          ></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Feedback</button>
        <p class="error-note" id="errorNote">Something went wrong — please try again.</p>

      </form>
    </div>

    <!-- ── THANK YOU ─────────────────────────────────────────── -->
    <div class="thankyou" id="thankyouWrap">
      <div class="thankyou-icon">☕</div>
      <h2>Thank You!</h2>
      <p>Your feedback helps us brew a better experience every single day. See you next time.</p>
      <a href="/" class="thankyou-back">← Back to coffeebeats.art</a>
    </div>

  </div>

  <p class="footer-note">coffeebeats.art &nbsp;·&nbsp; specialty coffee for creators</p>

  <script>
    // ─────────────────────────────────────────────────────────────
    //  Google Apps Script endpoint — handles all feedback submissions
    // ─────────────────────────────────────────────────────────────
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNQ5GKyCeCARRl8A1inb6RPSmgHsztBklURk4AZlN7x5aLiigBWap35lfiJxLtpFq_dg/exec';

    let selectedRating  = null;
    let selectedRatingLabel = '';
    const selectedStandout  = new Set();

    // ── Rating selection ─────────────────────────────────────────
    function selectRating(btn) {
      document.querySelectorAll('.emoji-btn').forEach(b => {
        b.classList.remove('selected');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('selected');
      btn.setAttribute('aria-pressed', 'true');
      selectedRating      = parseInt(btn.dataset.value, 10);
      selectedRatingLabel = btn.dataset.label;
    }

    // ── Chip toggle ──────────────────────────────────────────────
    function toggleChip(chip) {
      const val = chip.dataset.value;
      if (chip.classList.contains('selected')) {
        chip.classList.remove('selected');
        chip.setAttribute('aria-pressed', 'false');
        selectedStandout.delete(val);
      } else {
        chip.classList.add('selected');
        chip.setAttribute('aria-pressed', 'true');
        selectedStandout.add(val);
      }
    }

    // ── Form submit ──────────────────────────────────────────────
    async function handleSubmit(e) {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const errorNote = document.getElementById('errorNote');

      submitBtn.textContent = 'Sending…';
      submitBtn.disabled    = true;
      errorNote.style.display = 'none';

      const payload = {
        type:        'feedback',
        timestamp:   new Date().toISOString(),
        rating:      selectedRating   ?? '',
        ratingLabel: selectedRatingLabel,
        barista:     document.getElementById('barista').value,
        standout:    Array.from(selectedStandout).join(', '),
        feedback:    document.getElementById('openFeedback').value.trim()
      };

      try {
        await fetch(SCRIPT_URL, {
          method:  'POST',
          mode:    'no-cors',          // Apps Script requires no-cors
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });

        // no-cors means we can't read the response — assume success
        document.getElementById('formWrap').style.display   = 'none';
        document.getElementById('thankyouWrap').style.display = 'block';

      } catch (err) {
        submitBtn.textContent   = 'Submit Feedback';
        submitBtn.disabled      = false;
        errorNote.style.display = 'block';
      }
    }
  </script>

</body>
</html>
